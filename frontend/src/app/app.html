<div class="dashboard-shell">
  <nav class="mobile-nav" aria-label="Mobile navigation">
    <a class="brand-mark" routerLink="/dashboard" aria-label="Jasm_Tine dashboard">Jasm_Tine</a>

    <div class="mobile-nav__actions">
      <button class="icon-button" type="button" aria-label="Search">
        <span class="material-symbols-outlined" aria-hidden="true">search</span>
      </button>

      <button class="icon-button" type="button" aria-label="Open notifications">
        <span class="material-symbols-outlined" aria-hidden="true">notifications</span>
      </button>

      <button class="avatar-button" type="button" aria-label="Open user profile">
        <img
          src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=160&q=80"
          alt="Jasmine profile portrait"
          width="40"
          height="40"
        />
      </button>
    </div>
  </nav>

  <aside class="sidebar" aria-label="Primary navigation">
    <header class="sidebar__header">
      <a class="brand-mark brand-mark--sidebar" routerLink="/dashboard">Jasm_Tine</a>
      <p>Management Suite</p>
    </header>

    <nav class="sidebar__nav" aria-label="Application sections">
      @for (item of navigationItems; track item.label) {
        <a
          class="nav-link"
          routerLinkActive="nav-link--active"
          [routerLinkActiveOptions]="{ exact: true }"
          [routerLink]="item.route"
        >
          <span class="material-symbols-outlined" aria-hidden="true">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <button class="primary-action" type="button">New Project</button>
  </aside>

  <main id="main-content" class="dashboard-main">
    <router-outlet />
  </main>

  <nav class="bottom-nav" aria-label="Mobile primary navigation">
    @for (item of navigationItems; track item.label) {
      <a
        class="bottom-nav__link"
        routerLinkActive="bottom-nav__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        [routerLink]="item.route"
        [attr.aria-label]="item.label"
      >
        <span class="material-symbols-outlined" aria-hidden="true">{{ item.icon }}</span>
      </a>
    }
  </nav>
</div>
